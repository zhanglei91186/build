name: Build Armbian Kernel for Transpeed

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Armbian build framework
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-aarch64-linux-gnu bison flex libssl-dev bc u-boot-tools

      - name: Build Kernel Package
        run: |
          ./compile.sh \
            BOARD=transpeed-8k618-t \
            BRANCH=edge \
            RELEASE=bookworm \
            KERNEL_ONLY=yes \
            KERNEL_CONFIGURE=no \
            EXPERT=yes \
            BUILD_MINIMAL=no \
            USE_GITHUB_UBOOT_MIRROR=yes

      - name: Upload Kernel Debs
        uses: actions/upload-artifact@v4
        with:
          name: kernel-debs
          path: output/debs/*.deb